<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/map.css">
  <script type="module" src="scripts/script.js"></script>
  <script type="module" src="scripts/map.js"></script>

</head>

<body>
  <main>
    <aside class="players">
      <div class="player-details">
        <template id="user">
          <div class="user">
            <div class="identifier row">
              <h2 class="name"></h2>
              <div class="symbol"></div>
            </div>
            <div class="train-car-data row">
              <img src="" alt="car">
              <p class="car-count"></p>
            </div>
          </div>
        </template>
      </div>

      <div class="log">

      </div>

    </aside>

    <article id="map"></article>
    
    <aside class="market">
      <div class="faceup-cards">
        <template id="face-up-cards">
          <div class="card">
            <img src="" alt="">
          </div>
        </template>
      </div>
      <div class="deck">
        <img src="assets/deck-images/car-card.png" alt="">
      </div>
    </aside>
  </main>
  <footer>
    <div class="hand-destination-tickets">
      <div class="container">
        <div class="ticket" id="a-b"></div>
        <div class="ticket" id="a-c"></div>
        <div class="ticket" id="c-b"></div>
      </div>
    </div>

    <div class="hand-car-cards row">
      <template id="card">
        <div class="hand-car-card">
          <span class="card-count"></span>
          <img class="card-img" src="" alt="">
        </div>
      </template>

      <div class="hand-car-card hand-card-red" id="card1">
        <span class="card-count">3</span>
        <img src="../blue.png" alt="">
      </div>
    </div>

    <div class="destination-tickets-deck-container">
      <div class="destination-tickets-deck">
        <img src="assets/deck-images/destination-card.png" alt="">
      </div>
    </div>
  </footer>
</body>

</html>
